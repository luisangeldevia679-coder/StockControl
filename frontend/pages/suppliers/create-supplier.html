<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nuevo proveedor | StockControl</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<link rel="stylesheet" href="../../assets/css/dashboard.css">
	<link rel="stylesheet" href="../../assets/css/suppliers.css">
</head>
<body>
<div class="wrapper">
	<main class="content">
		<nav class="navbar navbar-expand-lg bg-white shadow-sm rounded-3 mb-4">
			<div class="container-fluid"><h4 class="fw-bold mb-0">Nuevo proveedor</h4></div>
		</nav>
		<div class="container-fluid">
			<div class="card shadow-sm border-0">
				<div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="fa-solid fa-truck"></i> Información del proveedor</h5></div>
				<div class="card-body">
					<form id="createSupplierForm">
						<div class="row g-3">
							<div class="col-md-6"><label class="form-label" for="company_name">Empresa</label><input class="form-control" id="company_name" name="company_name" required></div>
							<div class="col-md-6"><label class="form-label" for="contact_name">Persona de contacto</label><input class="form-control" id="contact_name" name="contact_name" required></div>
							<div class="col-md-6"><label class="form-label" for="email">Correo electrónico</label><input class="form-control" id="email" name="email" type="email"></div>
							<div class="col-md-6"><label class="form-label" for="phone">Teléfono</label><input class="form-control" id="phone" name="phone"></div>
							<div class="col-12"><label class="form-label" for="address">Dirección</label><input class="form-control" id="address" name="address"></div>
						</div>
						<div class="d-flex justify-content-end mt-4"><a href="suppliers.html" class="btn btn-secondary me-2">Cancelar</a><button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Guardar proveedor</button></div>
					</form>
					<div id="supplierMessage" class="mt-3"></div>
				</div>
			</div>
		</div>
	</main>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/create-supplier.js"></script>
</body>
</html>
