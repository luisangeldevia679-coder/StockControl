<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Proveedores | StockControl ERP</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../assets/css/dashboard.css">

    <link rel="stylesheet"
          href="../../assets/css/suppliers.css">

</head>

<body>

<div class="wrapper">

    <!-- ==========================
            SIDEBAR
    ========================== -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-boxes-stacked"></i>

            <h2>StockControl</h2>

        </div>

        <ul>

            <li>

                <a href="../dashboard/dashboard.html">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="../products/products.html">

                    <i class="fa-solid fa-box"></i>

                    Productos

                </a>

            </li>

            <li>

                <a href="../categories/categories.html">

                    <i class="fa-solid fa-layer-group"></i>

                    Categorías

                </a>

            </li>

            <li class="active">

                <a href="#">

                    <i class="fa-solid fa-truck"></i>

                    Proveedores

                </a>

            </li>

        </ul>

    </aside>

    <!-- ==========================
            CONTENIDO
    ========================== -->

    <main class="content">

        <!-- TOPBAR -->

        <nav class="topbar">

            <div>

                <h3>Gestión de Proveedores</h3>

                <span>

                    Administra todos los proveedores registrados.

                </span>

            </div>

            <a
                href="create_supplier.html"
                class="btn btn-primary">

                <i class="fa-solid fa-plus"></i>

                Nuevo Proveedor

            </a>

        </nav>

        <!-- BUSCADOR -->

        <div class="supplier-toolbar">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="searchSupplier"
                    class="form-control"
                    placeholder="Buscar proveedor...">

            </div>

            <select class="form-select">

                <option>

                    Todos

                </option>

                <option>

                    Activos

                </option>

                <option>

                    Inactivos

                </option>

            </select>

        </div>

        <!-- TABLA -->

        <div class="table-section">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Empresa</th>

                        <th>Contacto</th>

                        <th>Teléfono</th>

                        <th>Correo</th>

                        <th>Ciudad</th>

                        <th>Estado</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="supplierTable">

                    <!-- Aquí se generarán las filas de la tabla mediante JavaScript -->    
                    
                </tbody>

            </table>

        </div>

        <!-- PAGINACIÓN -->

        <nav class="mt-4">

            <ul class="pagination justify-content-end">

                <li class="page-item disabled">

                    <a class="page-link" href="#">

                        Anterior

                    </a>

                </li>

                <li class="page-item active">

                    <a class="page-link" href="#">

                        1

                    </a>

                </li>

                <li class="page-item">

                    <a class="page-link" href="#">

                        2

                    </a>

                </li>

                <li class="page-item">

                    <a class="page-link" href="#">

                        3

                    </a>

                </li>

                <li class="page-item">

                    <a class="page-link" href="#">

                        Siguiente

                    </a>

                </li>

            </ul>

        </nav>

    </main>

</div>

<script src="../../assets/js/suppliers.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
